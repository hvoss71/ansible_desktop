---
# Playbook: Installation von wine inkl. 32bit-Architektur auf Debian

-


  vars:
    benutzername: zeugnis
    exe_glob_root: "data/Fuxmedia_Erfassungsmodul_*"
    desktop_subpath: "Schreibtisch"

  tasks:

  ---
- name: Noteneingabe-Windows-App Reset-Knopf
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    benutzername: zeugnis
    wine_dir: "~{{ benutzername }}/.wine"  # Pfad zum .wine-Verzeichnis (anpassen!)

 vars_prompt:
    - name: confirm_reset
      prompt: "Lässt sich das Noteneingabe-Programm nicht mehr starten?"
      private: no
      # Werte: Ja / Nein
      choices:
        - "Ja"
        - "Nein"
  tasks:
    - name: Home-Verzeichnis des Benutzers ermitteln
      ansible.builtin.shell: "eval echo ~{{ benutzername }}"
      register: user_home
      changed_when: false

    - name: Prüfe, ob das .wine-Verzeichnis existiert
      ansible.builtin.stat:
        path: "{{ user_home.stdout }}/.wine"
      register: wine_dir_exists

    - name: Lösche das .wine-Verzeichnis bei Bestätigung (Ja)
      ansible.builtin.file:
        path: "{{ user_home.stdout }}/.wine"
        state: absent
      when:
        - wine_dir_exists.stat.exists
        - confirm_reset == "Ja"
      # Optional: Debug-Ausgabe nach Löschung
    - name: Bestätigung der Löschung anzeigen
      ansible.builtin.debug:
        msg: ".wine-Verzeichnis wurde gelöscht: {{ user_home.stdout }}/.wine"
      when:
        - wine_dir_exists.stat.exists
        - confirm_reset == "Ja"

    - name: Hinweis, dass kein Löschen erfolgt ist
      ansible.builtin.debug:
        msg: "Kein Löschvorgang durchgeführt."
      when:
        - wine_dir_exists.stat.exists
        - confirm_reset != "Ja"










  - name: Home-Verzeichnis des Benutzers ermitteln
    ansible.builtin.shell: "eval echo ~{{ benutzername }}"
    register: user_home
    changed_when: false

  - name: Prüfen, ob Verzeichnis '.wine' existiert
    ansible.builtin.stat:
      path: "{{ user_home.stdout }}/.wine"
    register: wine_dir

  - name: Entferne das Verzeichnis ./wine rekursiv, falls vorhanden
    ansible.builtin.file:
      path: "{{ user_home.stdout }}/.wine"
      state: absent
    when: wine_dir.stat.exists

  - name: Suche nach der Erfassungsmodul EXE in .data/Fuxmedia_Erfassungsmodul_*
    ansible.builtin.find:
      paths: "{{ user_home.stdout }}/.data"
      patterns: "erfassungsmodul_fuxmedia.exe"
      file_type: file
      recurse: yes
    register: found_exe

  - name: Erzeuge Desktop-Verknüpfung für die erste gefundene EXE mit Arbeitsverzeichnis
    when: found_exe.matched > 0
    ansible.builtin.copy:
      dest: "{{ user_home.stdout }}/{{ desktop_subpath }}/Erfassungsmodul_Fuxmedia.desktop"
      content: |
        [Desktop Entry]
        Version=1.0
        Type=Application
        Name=Erfassung der Noten
        Comment=Starte Erfassungsmodul via Wine (32-Bit)
        # Setze Arbeitsverzeichnis auf das Verzeichnis der EXE und rufe Wine mit dem vollständigen Pfad auf
        Exec=bash -lc 'cd "{{ (found_exe.files[0].path | dirname) }}" && WINEARCH=win32 wine "./{{ found_exe.files[0].path | basename }}"'
        Icon=application-x-executable
        Terminal=false
        Categories=Development;Utility;
        StartupNotify=true
      owner: "{{ benutzername }}"
      group: "{{ benutzername }}"
      mode: '0755'


      ---
- name: Desktop-Link zum Neustart/Reset von .wine
  hosts: all
  become: true
  vars:
    benutzername: zeugnis
    desktop_subpath: "Schreibtisch"  # deutschsprachiger Desktop-Ordner
    wrapper_path: "~{{ benutzername }}/.data/wine_reset_wrapper.sh"
  tasks:
    - name: Home-Verzeichnis des Benutzers ermitteln
      ansible.builtin.shell: "eval echo ~{{ benutzername }}"
      register: user_home
      changed_when: false

    - name: Wrapper-Skript für Reset erstellen
      ansible.builtin.copy:
        dest: "{{ user_home.stdout }}/.data/wine_reset_wrapper.sh"
        content: |
          #!/bin/bash
          if ! command -v read >/dev/null 2>&1; then
            echo "Interaktive Eingabe wird benötigt. Bitte eine Shell verwenden."
            exit 1
          fi
          read -p "Diese Aktion macht nur Sinn, wenn das Program geschlossen ist und sich nicht mehr starten lässt. Möchtest du das Pogramm jetzt zurücksetzen? (Ja/Nein): " user_choice
          case \"$user_choice\" in
            Ja|ja|YES|Yes|yes)
              rm -rf "$HOME/.wine"
              echo "Das Programm wurde zurückgesetzt. Es lässt sich jetzt wieder starten!"
              ;;
            *)
              echo "Zurücksetzen abgebrochen."
              ;;
          esac
        mode: '0755'
        owner: "{{ benutzername }}"
        group: "{{ benutzername }}"

    - name: Desktop-Verknüpfung erstellen
      ansible.builtin.copy:
        dest: "{{ user_home.stdout }}/{{ desktop_subpath }}/Programm zurücksetzen.desktop"
        content: |
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Programm zurücksetzen
          Comment=Löscht das .wine-Verzeichnis nach Bestätigung
          Exec=bash -lc '"{{ wrapper_path | replace(\"~\", \"$HOME\") }}"'
          Icon=system-run
          Terminal=false
          Categories=Utility;
          StartupNotify=true
        owner: "{{ benutzername }}"
        group: "{{ benutzername }}"
        mode: '0755'

