---
- hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    benutzername: zeugnis
    desktop_subpath: "Schreibtisch"  # deutsches Desktop-Verzeichnis
  tasks:
    - name: Home-Verzeichnis des Benutzers ermitteln
      ansible.builtin.shell: "eval echo ~{{ benutzername }}"
      register: user_home
      changed_when: false

    - name: Wrapper-Skript für Reset erstellen
      ansible.builtin.copy:
        dest: "{{ user_home.stdout }}/.data/wine_reset_wrapper.sh"
        content: |
          #!/bin/bash
          read -p "Lässt sich das Noteneingabe-Programm nicht mehr starten? (Ja/Nein): " user_choice
          case "$user_choice" in
            Ja|ja|YES|Yes|yes)
              rm -rf "$HOME/.wine"
              echo ".wine-Verzeichnis wurde gelöscht."
              ;;
            *)
              echo "Löschung abgebrochen."
              ;;
          esac
        mode: '0755'
        owner: "{{ benutzername }}"
        group: "{{ benutzername }}"

    - name: Desktop-Verknüpfung erstellen
      ansible.builtin.copy:
        dest: "{{ user_home.stdout }}/{{ desktop_subpath }}/Programm zurücksetzen.desktop"
        content: |
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Programm zurücksetzen
          Comment=Löscht das .wine-Verzeichnis nach Bestätigung
          Exec=bash -lc "$HOME/.data/wine_reset_wrapper.sh"
          Icon=system-run
          Terminal=false
          Categories=Utility;
          StartupNotify=true
        mode: '0755'
        owner: "{{ benutzername }}"
        group: "{{ benutzername }}"
