---
- hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    benutzername: zeugnis
    desktop_subpath: "Schreibtisch"  # deutsches Desktop-Verzeichnis

  tasks:
    - name: Home-Verzeichnis des Benutzers ermitteln
      ansible.builtin.shell: "eval echo ~{{ benutzername }}"
      register: user_home
      changed_when: false

    - name: Zenity installieren (falls benötigt)
      apt:
        name: zenity
        state: present
        update_cache: yes
      when: ansible_facts.os_family == "Debian"

    - name: Wrapper-Skript für Reset mit Zenity erstellen
      ansible.builtin.copy:
        dest: "{{ user_home.stdout }}/.data/wine_reset_wrapper_zenity.sh"
        content: |
          #!/bin/bash
          if command -v zenity >/dev/null 2>&1; then
            if zenity --question --text="Lässt sich das Noteneingabe-Programm nicht mehr starten?" --ok-label="Ja" --cancel-label="Nein"; then
              rm -rf "$HOME/.wine"
              zenity --info --text=".wine-Verzeichnis wurde gelöscht."
            else
              zenity --info --text="Löschung abgebrochen."
            fi
          else
            echo "Zenity nicht installiert."
            exit 1
          fi
        mode: '0755'
        owner: "{{ benutzername }}"
        group: "{{ benutzername }}"

    - name: Desktop-Verknüpfung erstellen (Zenity-Variante)
      ansible.builtin.copy:
        dest: "{{ user_home.stdout }}/{{ desktop_subpath }}/Programm zurücksetzen.desktop"
        content: |
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Programm zurücksetzen
          Comment=Löscht das .wine-Verzeichnis nach Bestätigung
          Exec=bash -lc "$HOME/.data/wine_reset_wrapper_zenity.sh"
          Icon=system-run
          Terminal=false
          Categories=Utility;
          StartupNotify=true
        mode: '0755'
        owner: "{{ benutzername }}"
        group: "{{ benutzername }}"


